<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWARAKAMAI XEROX - Login</title>
    <!-- Add Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .brand-header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .brand-header::before {
            content: '💰';
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 120px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }

        .brand-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .brand-header .subtitle {
            font-size: 16px;
            opacity: 0.9;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        .brand-header .company-detail {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
            position: relative;
            z-index: 1;
        }

        .login-form-container {
            padding: 40px 30px;
            background: white;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text h2 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .welcome-text p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .form-group input:focus {
            border-color: #3498db;
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(52,152,219,0.1);
        }

        .form-group input::placeholder {
            color: #999;
            font-size: 14px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #3498db;
        }

        .remember-me span {
            color: #666;
            font-size: 14px;
        }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(52,152,219,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .demo-credentials {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 2px dashed #3498db;
        }

        .demo-credentials p {
            color: #2c3e50;
            font-size: 13px;
            margin: 5px 0;
        }

        .demo-credentials .cred-label {
            font-weight: 600;
            color: #3498db;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .demo-credentials code {
            background: white;
            padding: 4px 8px;
            border-radius: 6px;
            color: #e74c3c;
            font-weight: 600;
        }

        .login-footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .login-footer p {
            margin: 5px 0;
        }

        .login-footer i {
            color: #e74c3c;
        }

        .error-message {
            background: #fee;
            color: #e74c3c;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
            border: 1px solid #fcc;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 16px;
        }

        @media (max-width: 480px) {
            .brand-header {
                padding: 30px 20px;
            }

            .brand-header h1 {
                font-size: 24px;
            }

            .login-form-container {
                padding: 30px 20px;
            }

            .form-options {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="brand-card">
            <div class="brand-header">
                <h1>DWARAKAMAI XEROX</h1>
                <div class="subtitle">& communication center</div>
                <div class="company-detail">
                    <i class="fas fa-map-marker-alt"></i> Visakhapatnam-16
                </div>
            </div>
            
            <div class="login-form-container">
                <div class="welcome-text">
                    <h2>Welcome Back! 👋</h2>
                    <p>Sign in to manage your invoices</p>
                </div>
                
                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Invalid username or password</span>
                </div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="username" placeholder="Enter your username" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                <div class="login-footer">
                    <p><i class="fas fa-phone"></i> Phone: 9346371235</p>
                    <p><i class="fas fa-envelope"></i> dwarakamaizerox@gmail.com</p>
                    <p>© 2024 DWARAKAMAI XEROX. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Database class
        class InvoiceDB {
            constructor() {
                this.INVOICES_KEY = 'dwarakamai_invoices';
                this.USERS_KEY = 'dwarakamai_users';
                this.CURRENT_USER_KEY = 'dwarakamai_current_user';
                this.initDB();
            }
            
            initDB() {
                if (!localStorage.getItem(this.USERS_KEY)) {
                    const defaultUsers = [
                        { username: 'admin', password: 'password123', email: 'admin@dwarakamai.com' }
                    ];
                    localStorage.setItem(this.USERS_KEY, JSON.stringify(defaultUsers));
                }
            }
            
            authenticate(username, password) {
                const users = JSON.parse(localStorage.getItem(this.USERS_KEY));
                const user = users.find(u => u.username === username && u.password === password);
                return user ? { username: user.username, email: user.email } : null;
            }
            
            setCurrentUser(user) {
                localStorage.setItem(this.CURRENT_USER_KEY, JSON.stringify(user));
            }
        }

        // Initialize
        const db = new InvoiceDB();
        const loginForm = document.getElementById('loginForm');
        const rememberMe = document.getElementById('rememberMe');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Check for saved credentials
        const savedUsername = localStorage.getItem('savedUsername');
        if (savedUsername) {
            document.getElementById('username').value = savedUsername;
            rememberMe.checked = true;
        }

        // Login form submission
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Simple validation
            if (!username || !password) {
                errorText.textContent = 'Please enter both username and password';
                errorMessage.classList.add('show');
                return;
            }
            
            const user = db.authenticate(username, password);
            
            if (user) {
                // Save credentials if remember me is checked
                if (rememberMe.checked) {
                    localStorage.setItem('savedUsername', username);
                } else {
                    localStorage.removeItem('savedUsername');
                }
                
                // Set current user and redirect
                db.setCurrentUser(user);
                
                // Add loading effect
                const btn = document.querySelector('.login-btn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            } else {
                errorText.textContent = 'Invalid username or password';
                errorMessage.classList.add('show');
                
                // Shake animation
                const form = document.querySelector('.login-form-container');
                form.style.animation = 'shake 0.5s ease';
                setTimeout(() => {
                    form.style.animation = '';
                }, 500);
            }
        });

        // Clear error when typing
        document.getElementById('username').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
        
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
